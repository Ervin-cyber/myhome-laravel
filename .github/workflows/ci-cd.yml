name: CI / CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.4'
  DOCKER_REGISTRY: 'docker.io'
  IMAGE_NAMESPACE: '${{ secrets.DOCKERHUB_USERNAME }}'

jobs:
  test:
    name: Run tests and build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_sqlite, zip
          cache: composer
          ini-values: post_max_size=256M, upload_max_filesize=256M

      - name: Install PHP dependencies
        working-directory: ./api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHP tests
        working-directory: ./api
        env:
          APP_KEY: base64:uS38FzS7S8R3XpYJz8x5W6V7U8T9S0R1Q2P3O4N5M6L=
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: composer test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./public/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./public
        run: npm ci

      - name: Build Next.js app
        working-directory: ./public
        run: npm run build

  build-and-push:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Laravel app image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/laravel:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/laravel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Next.js frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./public
          file: public/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/nextjs-frontend:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/nextjs-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_REVERB_APP_KEY=85r6cbqutni8angnhqkd
            NEXT_PUBLIC_REVERB_HOST=home.papstack.net
            NEXT_PUBLIC_REVERB_PORT=443
            NEXT_PUBLIC_REVERB_SCHEME=https
