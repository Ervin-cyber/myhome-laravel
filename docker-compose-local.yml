services:
  redis:
    image: redis:alpine
    container_name: myhome-redis-local
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redisdata_local:/data
    networks:
      - app-network

  # Laravel API - Built locally with source code mounted
  laravel:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: myhome-laravel-local
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      - APP_URL=http://localhost
    volumes:
      - ./api:/var/www/html
    depends_on:
      - redis
    networks:
      - app-network

  # WebSocket Server
  laravel-reverb:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: laravel-reverb-local
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      - APP_URL=http://localhost
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    volumes:
      - ./api:/var/www/html
    depends_on:
      - redis
    networks:
      - app-network

  # Queue Worker
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: laravel-worker-local
    restart: unless-stopped
    env_file:
      - ./api/.env
    command: php artisan queue:work redis --tries=3 --delay=3
    volumes:
      - ./api:/var/www/html
    depends_on:
      - redis
    networks:
      - app-network

  # Nginx Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy-local
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./api:/var/www/html
    ports:
      - "80:80"
    depends_on:
      - laravel
      - nextjs
      - laravel-reverb
    networks:
      - app-network

  # Next.js Frontend - Built locally with hot-reloading support
  nextjs:
    build:
      context: ./public
      dockerfile: Dockerfile
    command: npm run dev
    container_name: nextjs-frontend-local
    restart: unless-stopped
    volumes:
      - ./public:/app
      - /app/node_modules
      - /app/.next
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=development
      - API_BASE_URL=http://nginx
      - NEXT_PUBLIC_REVERB_APP_KEY=85r6cbqutni8angnhqkd
      - NEXT_PUBLIC_REVERB_HOST=localhost
      - NEXT_PUBLIC_REVERB_PORT=8081
      - NEXT_PUBLIC_REVERB_SCHEME=http
    networks:
      - app-network

volumes:
  redisdata_local:

networks:
  app-network:
    driver: bridge