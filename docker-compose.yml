services:
  redis:
    image: redis:alpine
    container_name: myhome-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redisdata:/data  # JAVÍTVA: Redis perzisztencia
    networks:
      - app-network

  # 1. Laravel PHP-FPM Service (API)
  laravel:
    image: ervinpap/laravel:latest # Csak az image kell, build nem
    container_name: myhome-laravel
    restart: unless-stopped
    volumes:
      # CSAK azokat a mappákat csatoljuk, amiknek perzisztensnek kell lenniük!
      # A kódot (./api) nem csatoljuk, az az image része!
      - ./api/database:/var/www/html/database
      - ./api/storage:/var/www/html/storage
    depends_on:
      - redis
    networks:
      - app-network

  # 2. Laravel Reverb WebSocket Server
  reverb:
    image: ervinpap/laravel:latest
    container_name: laravel-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    volumes:
    - ./api/database:/var/www/html/database
    - ./api/storage:/var/www/html/storage
    depends_on:
      - redis
    networks:
      - app-network

  # 3. Laravel Queue Worker
  worker:
    image: ervinpap/laravel:latest
    container_name: laravel-worker
    restart: unless-stopped
    command: php artisan queue:work redis --tries=3 --delay=3
    volumes:
      - ./api/database:/var/www/html/database
      - ./api/storage:/var/www/html/storage
    depends_on:
      - redis
    networks:
      - app-network

  # 4. Nginx Web Server (Proxy/Entrypoint)
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - laravel
      - nextjs
    networks:
      - app-network

  # 5. Next.js Frontend
  nextjs:
    image: ervinpap/nextjs-frontend:latest 
    container_name: nextjs-frontend
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=production
      - API_BASE_URL=https://home.papstack.net
    networks:
      - app-network

  # 6. Watchtower - Automatic Deployment
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    networks:
      - app-network

  # 7. Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: home-cloudflare-tunnel
    restart: unless-stopped
    environment: 
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - app-network

volumes:
  redisdata:

networks:
  app-network:
    driver: bridge